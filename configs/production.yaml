paths:
  input_dir: /model/test
  output_file: /result/submission.csv
  status_file: /result/run_status.json
  progress_program: /benchmark_lib/progress
  prompt_dir: /workspace/prompts

models:
  root: /opt/models
  generator: /opt/models/generator
  thai_guard: /opt/models/thai_guard

generation:
  max_model_len: 8192
  gpu_memory_utilization: 0.72
  max_num_seqs: 8
  language_model_only: true
  chat_template_kwargs:
    enable_thinking: false
  speculative_config:
    method: qwen3_next_mtp
    num_speculative_tokens: 2
  temperature: 0.2
  top_p: 0.9
  seed: 42

guards:
  thai_device: cuda
  thai_batch_size: 8
  thai_harmful_threshold: 0.50
  thai_max_length: 128
  thai_min_visible_response_tokens: 1
  thai_context_preserve_max_visible_tokens: 8

limits:
  safe_direct_tokens: 384
  safe_sensitive_tokens: 224
  unsafe_tokens: 128
  rewrite_tokens: 224
  max_response_chars: 5000
