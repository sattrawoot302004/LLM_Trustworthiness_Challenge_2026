paths:
  input_dir: /model/test
  output_file: /result/submission.csv
  progress_program: /benchmark_lib/progress
  prompt_dir: /workspace/prompts

models:
  root: /opt/models
  generator: /opt/models/generator
  thai_guard: /opt/models/thai_guard

generation:
  max_model_len: 8192
  gpu_memory_utilization: 0.90
  max_num_seqs: 16
  temperature: 0.2
  top_p: 0.9
  seed: 42

guards:
  thai_device: cpu
  thai_batch_size: 16
  thai_harmful_threshold: 0.70

limits:
  safe_direct_tokens: 384
  safe_sensitive_tokens: 256
  unsafe_tokens: 160
  rewrite_tokens: 256
  max_response_chars: 5000
